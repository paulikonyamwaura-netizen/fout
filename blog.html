// ====================== RENDER FUNCTIONS ======================
function renderList() {
    let html = `
        <section class="blog-hero">
            <div class="hero-content">
                <p class="section-tag">INDUSTRY INSIGHTS</p>
                <h1 class="section-title">Knowledge & Expertise</h1>
                <p class="section-text" style="max-width: 680px; margin: 20px auto 0;">
                    Expert perspectives on signage, branding, fabrication, and visual communication.
                </p>
            </div>
        </section>
        <main class="container">
            <div class="blog-grid">
    `;
    Object.keys(blogs).forEach(id => {
        const post = blogs[id];
        // Updated href to use query parameters (?post=) instead of hash (#)
        html += `
            <a href="?post=${id}" class="blog-card">
                <div class="blog-card-image-wrapper">
                    <!-- SEO Optimized Alt Text & Async Decoding -->
                    <img src="${post.image}" alt="${post.title} - Architectural and Signage Insights Qatar" loading="lazy" decoding="async">
                </div>
                <div class="blog-card-content">
                    <div class="blog-meta">${post.category}</div>
                    <h3>${post.title}</h3>
                    <p class="blog-excerpt">${post.content.substring(0, 145)}...</p>
                    <span class="btn-secondary" style="margin-top:auto;">Read Full Article →</span>
                </div>
            </a>
        `;
    });
    html += `</div></main>`;
    return html;
}

function renderPost(id) {
    const post = blogs[id];
    if (!post) return renderList();

    // --- AGGRESSIVE SEO INJECTION START ---
    
    // Update Title and Meta Description
    document.title = `${post.title} | Mars Sign Insights`;
    let metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) {
        // Grab the first 150 characters for the description
        metaDesc.setAttribute("content", post.content.substring(0, 150) + "...");
    }

    // Remove any previously injected article schema to avoid duplicates
    const existingSchema = document.getElementById('dynamic-article-schema');
    if (existingSchema) existingSchema.remove();

    // Inject 'Article' JSON-LD Schema
    const articleSchema = {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": post.title,
        "articleSection": post.category,
        "image": "https://marssign.com" + post.image.replace('./', '/'),
        "author": {
            "@type": "Organization",
            "name": "Mars Sign & Craft"
        },
        "publisher": {
            "@type": "Organization",
            "name": "Mars Sign & Craft",
            "logo": {
                "@type": "ImageObject",
                "url": "https://marssign.com/images/0/20885491/Mars-logo-PpRQrZOCPddFumb2s9tzmg.png"
            }
        },
        "description": post.content.substring(0, 150) + "..."
    };

    const scriptTag = document.createElement('script');
    scriptTag.id = 'dynamic-article-schema';
    scriptTag.type = "application/ld+json";
    scriptTag.text = JSON.stringify(articleSchema);
    document.head.appendChild(scriptTag);
    
    // --- AGGRESSIVE SEO INJECTION END ---

    return `
        <div class="blog-post" style="max-width:920px; margin:120px auto; padding:0 20px;">
            <a href="blog.html" class="btn-secondary" style="margin-bottom:30px; display:inline-block;">← Back to All Articles</a>
            <h1 class="section-title">${post.title}</h1>
            <!-- SEO Optimized Alt Text & High Fetch Priority for LCP -->
            <img src="${post.image}" alt="${post.title} - Architectural and Signage Insights Qatar" style="width:100%; border-radius:16px; margin:30px 0;" fetchpriority="high">
            <div style="font-size:1.08rem; line-height:1.85; color:#333;">
                ${post.content}
            </div>
            <a href="/#contact" class="btn-primary" style="margin-top:50px;">Work With Us</a>
        </div>
    `;
}

// ====================== ROUTING ======================
// Query parameters trigger a fresh page load, so we only need DOMContentLoaded
document.addEventListener("DOMContentLoaded", () => {
    const urlParams = new URLSearchParams(window.location.search);
    const queryKey = urlParams.get('post');
    const container = document.getElementById('blog-container');
    
    container.innerHTML = queryKey ? renderPost(queryKey) : renderList();
    window.scrollTo(0, 0);
});
