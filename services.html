<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Details | Mars Sign & Craft</title>
    <meta name="description" content="Detailed overview of our premium fabrication and signage services in Qatar.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Single Service Page Specific Styles */
        body { background-color: var(--bg-silver); }
        
        /* Auto-filling Image Grid */
        .service-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-elevation);
        }

        .service-gallery img {
            width: 100%;
            height: 450px; 
            object-fit: cover; 
            display: block;
            background: #e3e8ec;
            transition: transform 0.4s ease;
        }

        .service-gallery img:hover {
            transform: scale(1.03);
        }

        .article-content {
            max-width: 860px;
            margin: 0 auto;
            background: var(--pure-white);
            padding: 60px;
            border-radius: 24px;
            box-shadow: var(--shadow-elevation);
            transform: translateY(-80px); 
            position: relative;
            z-index: 10;
        }

        .article-lead {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--accent-teal);
            line-height: 1.6;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--bg-silver);
        }

        .article-body {
            font-size: 1.1rem;
            color: var(--text-body);
            line-height: 1.85;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin: 40px 0;
            padding: 0;
            list-style: none;
        }

        .feature-grid li {
            background: var(--bg-silver);
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-heading);
            display: flex;
            align-items: center;
        }

        .feature-grid li::before {
            content: '✦';
            color: var(--accent-teal);
            margin-right: 12px;
            font-size: 1.2rem;
        }

        /* Updated CTA Banner to contrast with the strong black button */
        .cta-banner {
            background: var(--bg-silver);
            color: var(--text-heading);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            margin-top: 50px;
            border: 1px solid #e3e8ec;
        }

        .cta-banner h3 {
            color: var(--text-heading);
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        @media (max-width: 768px) {
            .article-content {
                padding: 30px 20px;
                transform: translateY(-40px);
            }
            .service-gallery img {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <header id="main-header" class="floating-header">
        <div class="header-container">
            <a href="/" class="logo">
                <img src="/images/0/20885491/Mars-logo-PpRQrZOCPddFumb2s9tzmg.svg" alt="Mars Signs Logo" width="172" height="47" class="brand-logo">
            </a>
            <nav class="primary-nav">
                <a href="/">Home</a>
                <a href="/projects.html">Projects</a>
                <a href="/blog.html">Insights</a>
                <a href="/#contact" class="btn-primary">Work With Us</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="container" style="margin-top: 130px;">
            <div style="margin-bottom: 30px;">
                <a href="/#solutions" class="btn-secondary">← Back to All Services</a>
            </div>

            <!-- Dynamic Content Container -->
            <div id="dynamic-service-view">
                <!-- Content injected by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-grid">
            <p>© 2026 Mars Sign & Craft. All rights reserved.</p>
        </div>
    </footer>

    <!-- Load App Logic to access serviceData -->
  <script src="app.js" defer></script> <!-- Added defer for performance -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    // 1. Get the requested service from the URL Query Parameter (e.g. ?service=awards)
    const urlParams = new URLSearchParams(window.location.search);
    const queryKey = urlParams.get('service');
    
    // 2. Validate against app.js data. Fallback to 'signage' if empty/invalid.
    const serviceKey = (queryKey && typeof serviceData !== 'undefined' && serviceData[queryKey]) ? queryKey : 'signage';
    const service = serviceData[serviceKey];
    
    // 3. Update Page Title
    document.title = `${service.title} | Mars Sign & Craft Qatar`;

    // --- AGGRESSIVE SEO INJECTION START ---
    
    // A. Dynamically update the Meta Description
    let metaDescription = document.querySelector('meta[name="description"]');
    if (metaDescription) {
        metaDescription.setAttribute("content", `${service.description} High-quality custom fabrication and installation in Doha, Qatar.`);
    }

    // B. Inject 'Service' JSON-LD Schema for Google
    const serviceSchema = {
        "@context": "https://schema.org/",
        "@type": "Service",
        "serviceType": service.title,
        "provider": {
            "@type": "LocalBusiness",
            "name": "Mars Sign & Craft",
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Doha",
                "addressCountry": "QA"
            }
        },
        "areaServed": {
            "@type": "City",
            "name": "Doha"
        },
        "description": service.description,
        "image": service.images.length > 0 ? "https://marssign.com" + service.images[0] : ""
    };

    const schemaScript = document.createElement('script');
    schemaScript.type = "application/ld+json";
    schemaScript.text = JSON.stringify(serviceSchema);
    document.head.appendChild(schemaScript);
    
    // --- AGGRESSIVE SEO INJECTION END ---

    // 4. Generate Images for the responsive Grid (SEO Optimized)
    const imagesHtml = service.images.map((img) => {
        return `<img src="${img}" alt="${service.title} manufacturing, fabrication, and installation in Doha, Qatar" loading="lazy" decoding="async" onerror="this.src='/images/dummy.png';">`;
    }).join('');
    
    // 5. Generate Feature List
    const featuresHtml = service.features.map(feature => `<li>${feature}</li>`).join('');
    
    // 6. Generate the praising "Blog" content based on the service title
    const dynamicPraise = `When it comes to <strong>${service.title.toLowerCase()}</strong>, we understand that quality and precision are non-negotiable. At Mars Sign & Craft, we combine advanced fabrication techniques with premium, weather-resistant materials to deliver results that not only meet industry standards but completely exceed them. <br><br> Your physical presence is an investment in your brand's authority. Our dedicated engineering and creative teams work tirelessly to ensure that every edge, color profile, and structural element reflects your core values perfectly. By choosing our ${service.title.toLowerCase()} solutions, you are securing a visually powerful asset designed for longevity and impact.`;
    
    // 7. Inject HTML into the container
    const container = document.getElementById('dynamic-service-view');
    container.innerHTML = `
        <div class="text-center mb-50 reveal-fade is-visible in-view">
            <p class="section-tag">SERVICE SPOTLIGHT</p>
            <h1 class="section-title" style="font-size: 3rem;">${service.title}</h1>
        </div>
        <div class="service-gallery reveal-fade is-visible in-view">
            ${imagesHtml}
        </div>
        <article class="article-content">
            <p class="article-lead">
                "${service.description}"
            </p>
            <div class="article-body">
                ${dynamicPraise}
            </div>
            <h3 style="margin-top: 50px; font-size: 1.5rem;">Key Capabilities</h3>
            <ul class="feature-grid">
                ${featuresHtml}
            </ul>
            <div class="cta-banner">
                <h3>Ready to elevate your visual identity?</h3>
                <p style="margin-bottom: 30px; font-size: 1.1rem;">Let's discuss how our team can bring your vision to life.</p>
                <!-- Strong Black CTA Button -->
                <a href="/#contact" class="btn-primary" style="background: #000000; color: #ffffff; font-size: 1.1rem; font-weight: 800; padding: 14px 32px; border-radius: 30px; transition: opacity 0.3s ease;">Request a Custom Quote</a>
            </div>
        </article>
    `;
    
    // Scroll to top automatically on page load
    window.scrollTo(0, 0);
});
</script>
</body>
</html>
